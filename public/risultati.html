<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Risultati - Busto Battle XI</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#F7AF40">
</head>
<body>
  <header>
    <h1><img src="LogoBB.jpeg" alt="Busto Battle" style="height:40px;border-radius:4px"></h1>
    <div class="lang-switcher">
      <button class="lang-btn" data-lang="it" onclick="setLang('it')">IT</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    </div>
    <button class="hamburger" onclick="document.querySelector('nav').classList.toggle('open')">☰</button>
    <nav>
      <a href="index.html" data-t="home">HOME</a>
      <a href="iscrizioni.html" data-t="iscrizioni">ISCRIZIONI</a>
      <a href="programma.html" data-t="programma">PROGRAMMA</a>
      <a href="travel.html" data-t="travel">TRAVEL SUGGESTIONS</a>
      <a href="contact.html" data-t="contact">CONTATTI</a>
    </nav>
  </header>
  <main class="page-content">
    <section class="info">
      <h2 data-t="risultatiTitle">📊 Risultati e Classifiche</h2>
      <p data-t="risultatiText" id="risultati-desc">Qui trovi le classifiche aggiornate della gara.</p>
      <div id="risultati-list"></div>
    </section>
  </main>
  <footer>
    <div class="footer-content">
      <div class="social-links">
        <a href="https://www.instagram.com/bustobattle/" target="_blank">📸 Instagram</a>
        <a href="https://www.facebook.com/bustobattle/" target="_blank">👍 Facebook</a>
      </div>
      <p class="footer-email">✉️ bustobattle@gmail.com</p>
      <p class="copyright">© 2025 Busto Battle XI. Tutti i diritti riservati.</p>
    </div>
  </footer>
  <script src="translations.js"></script>
  <script src="page-guard.js"></script>
  <script>
    async function loadRisultati() {
      const res = await fetch('/api/risultati');
      const list = await res.json();
      const div = document.getElementById('risultati-list');
      if (!list.length) {
        div.innerHTML = '<p style="color:#888;margin-top:1rem" data-t="risultatiEmpty">Nessun risultato pubblicato ancora.</p>';
        applyLang();
        return;
      }
      div.innerHTML = list.map(r => `
        <div class="risultato-card">
          <div class="risultato-info">
            <div class="risultato-row"><strong>📄 ${r.titolo}</strong>${r.categoria ? `<span class="risultato-cat">${r.categoria}</span>` : ''}</div>
            <small>${new Date(r.created_at).toLocaleDateString('it-IT', { day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit' })}</small>
          </div>
          <a href="/uploads/${r.filename}" target="_blank" class="btn-download">⬇️ PDF</a>
        </div>
      `).join('');
    }
    loadRisultati();
  </script>
  <script src="app.js"></script>
</body>
</html>
