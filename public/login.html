<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Busto Battle XI</title>
  <link rel="icon" type="image/jpeg" href="/LogoBB.jpeg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🏆 BUSTO BATTLE XI</h1>
  </header>
  <main class="page-content" style="display:flex;justify-content:center;align-items:center;min-height:60vh">
    <section class="form-section" style="max-width:400px;width:100%">
      <h2 style="text-align:center">🔐 Admin Login</h2>
      <form id="form-login">
        <div class="form-row">
          <input type="text" name="username" placeholder="Username" required autofocus>
        </div>
        <div class="form-row">
          <input type="password" name="password" placeholder="Password" required>
        </div>
        <button type="submit" style="width:100%">Accedi</button>
      </form>
      <p id="login-msg" class="msg" style="color:#e74c3c;text-align:center"></p>
    </section>
  </main>
  <script>
    document.getElementById('form-login').addEventListener('submit', async e => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: fd.get('username'), password: fd.get('password') })
      });
      if (res.ok) {
        window.location.href = '/admin.html';
      } else {
        document.getElementById('login-msg').textContent = 'Username o password errati';
      }
    });
  </script>
</body>
</html>
