<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <!-- T-shirt shape -->
  <path d="M100,0 L60,0 L0,80 L40,100 L70,60 L70,480 L330,480 L330,60 L360,100 L400,80 L340,0 L300,0 L280,30 C260,50 140,50 120,30 Z" fill="#111" stroke="#222" stroke-width="2"/>
  <!-- Collar -->
  <ellipse cx="200" cy="25" rx="50" ry="20" fill="none" stroke="#333" stroke-width="2"/>
  <!-- WorldSkate logo area (shoulders) -->
  <circle cx="200" cy="120" r="40" fill="none" stroke="#F7AF40" stroke-width="2"/>
  <text x="200" y="115" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="14" font-weight="bold" fill="#F7AF40">WORLD</text>
  <text x="200" y="133" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="14" font-weight="bold" fill="#F7AF40">SKATE</text>
  <!-- Small globe icon -->
  <circle cx="200" cy="120" r="30" fill="none" stroke="#F7AF40" stroke-width="0.5" opacity="0.4"/>
  <ellipse cx="200" cy="120" rx="15" ry="30" fill="none" stroke="#F7AF40" stroke-width="0.5" opacity="0.4"/>
  <line x1="170" y1="120" x2="230" y2="120" stroke="#F7AF40" stroke-width="0.5" opacity="0.4"/>
  <!-- Label -->
  <text x="200" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#666">RETRO</text>
</svg>
